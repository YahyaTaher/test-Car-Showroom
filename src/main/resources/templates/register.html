<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Premium Auto</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            width: 100%;
            max-width: 600px;
            padding: 3rem 2.5rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header h2 {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: #64748b;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="auth-container">
        <div class="card auth-card animate-fade-in-down">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Join Premium Auto and explore our exclusive inventory</p>
            </div>
            
            <div id="alert-success" class="alert alert-success" style="display:none; color: green; text-align: center; margin-bottom: 1rem;"></div>
            <div id="alert-error" class="alert alert-error" style="display:none; color: red; text-align: center; margin-bottom: 1rem;"></div>
            
            <form id="register-form">
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" class="form-control" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" class="form-control" placeholder="Last Name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" placeholder="Phone" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">Birth Date</label>
                        <input type="date" id="birthdate" class="form-control" required>
                    </div>
                </div>

                <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid rgba(0,0,0,0.1);">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Register Now</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; color: #64748b;">
                Already have an account? <a href="/login" style="color: var(--secondary-color); font-weight: 600; text-decoration: none;">Sign in here</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fname').value + ' ' + document.getElementById('lname').value;
            const formData = {
                fullName: fullName,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            
            await register(formData);
        });
    </script>
</body>
</html>
