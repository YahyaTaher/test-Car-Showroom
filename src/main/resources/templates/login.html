<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Premium Auto</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header h2 {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: #64748b;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="main-nav"></nav>

    <div class="auth-container">
        <div class="card auth-card animate-fade-in-down">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access your Premium Auto account</p>
            </div>
            
            <div id="alert-error" class="alert alert-error" style="display:none; color: red; text-align: center; margin-bottom: 1rem;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; color: #64748b;">
                Don't have an account? <a href="/register" style="color: var(--secondary-color); font-weight: 600; text-decoration: none;">Register here</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            await login({ username, password });
        });
    </script>
</body>
</html>
