services:
  db:
    image: mysql:8.0
    container_name: showroom-db
    restart: always
    environment:
      MYSQL_DATABASE: showroom_2
      MYSQL_ROOT_PASSWORD: yahya2004718
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: car-showroom
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/showroom_2
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: yahya2004718
    ports:
      - "8080:8080"

volumes:
  mysql_data: